name: Validar Perguntas

on:
  pull_request:
    paths:
      - "questions/**"
  push:
    branches:
      - main
    paths:
      - "questions/**"
      - "schemas/**"

jobs:
  validate:
    name: Validar JSON e Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm ci

      - name: Validar schemas
        run: npm run validate

      - name: Verificar IDs duplicados
        run: npm run check:duplicates
      
      - name: Formatar JSON
      - run: npm run lint:fix
      
      - name: Verificar formatação
        run: npm run lint